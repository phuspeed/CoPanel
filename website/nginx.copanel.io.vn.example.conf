# Example: serve https://copanel.io.vn/install.sh (short one-liner for users)
#
# Install on server:
#   sudo cp nginx.copanel.io.vn.example.conf /etc/nginx/sites-available/copanel.io.vn
#   sudo ln -sf /etc/nginx/sites-available/copanel.io.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# User command:
#   curl -fsSL https://copanel.io.vn/install.sh | sudo bash
#   curl -fsSL https://copanel.io.vn/install.sh | sudo bash -s -- --desktop

server {
    listen 80;
    listen [::]:80;
    server_name copanel.io.vn www.copanel.io.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name copanel.io.vn www.copanel.io.vn;

    # certbot: sudo certbot --nginx -d copanel.io.vn -d www.copanel.io.vn
    ssl_certificate     /etc/letsencrypt/live/copanel.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/copanel.io.vn/privkey.pem;

    root /var/www/copanel.io.vn;
    index index.html;

    # Short install URL — proxies latest install.sh from GitHub main (no duplicate to maintain)
    location = /install.sh {
        proxy_pass https://raw.githubusercontent.com/phuspeed/CoPanel/main/scripts/install.sh;
        proxy_set_header Host raw.githubusercontent.com;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Marketing site (website/index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
